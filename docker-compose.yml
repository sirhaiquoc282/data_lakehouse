networks:
  datalakehouse-net:
    driver: bridge
    attachable: true

volumes:
  minio_data:
  postgres_data:
  spark_data:
  ranger_logs:
  kafka-data-0:
  kafka-data-1:
  kafka-data-2:
  postgres_keycloak_data: